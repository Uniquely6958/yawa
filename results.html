<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WhatsApp Analysis Results</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Analysis Results</h1>

    <section id="results-section">
      <ul id="stats">
        <li><strong>Total messages:</strong> <span id="total">0</span></li>
        <li><strong>Unique senders:</strong> <span id="senders">0</span></li>
        <li><strong>Media messages:</strong> <span id="media">0</span></li>
      </ul>

      <div id="per-sender">
        <h3>Messages per sender</h3>
        <table id="sender-table">
          <thead><tr><th>Sender</th><th>Messages</th><th>Media</th><th>Words Typed</th><th>Wordstock</th><th>Longest (words)</th><th>Avg words/msg</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="participants" style="margin-top:12px"></div>

      <div id="emoji-stats" style="margin-top:12px"></div>

      <div id="daily-graph" style="margin-top:18px">
        <h3>Messages per Day</h3>
        <canvas id="dayCanvas" width="900" height="300" style="border:1px solid #eee;width:100%;max-width:900px;height:auto"></canvas>
        <div id="dayLegend" style="margin-top:8px;font-size:13px"></div>
      </div>

      <div id="wordcloud-controls" style="margin-top:18px">
        <h3>Word Cloud</h3>
        <label>Max words: <input id="maxWords" type="number" value="80" min="10" max="500"/></label>
        <button id="genCloud" style="margin-left:12px">Show Top 25 Words</button>
      </div>

      <div style="margin-top:12px">
        <canvas id="wordCanvas" width="900" height="600" style="border:1px solid #eee;width:100%;max-width:900px;height:auto"></canvas>
      </div>

      <div id="topWords" style="margin-top:12px;display:none"></div>

      <div style="margin-top:16px">
        <button id="back">Back</button>
      </div>
    </section>
  </main>

  <script>
    const dataRaw = sessionStorage.getItem('wa_results');
    if (!dataRaw){
      document.getElementById('total').textContent = '0';
    } else {
      try {
        const d = JSON.parse(dataRaw);
        document.getElementById('total').textContent = d.total;
        document.getElementById('senders').textContent = d.senders.length;
        document.getElementById('media').textContent = d.media;

        const tbody = document.querySelector('#sender-table tbody');
        tbody.innerHTML = '';
        // show per-sender counts including words, longest message (words) and average
        d.senders.sort((a,b)=>b.count - a.count).forEach(s => {
          const tr = document.createElement('tr');
          const td1 = document.createElement('td'); td1.textContent = s.name;
          const td2 = document.createElement('td'); td2.textContent = s.count;
          const td3 = document.createElement('td'); td3.textContent = s.media || 0;
          const td4 = document.createElement('td'); td4.textContent = (s.wordsTotal!=null) ? s.wordsTotal : (d.senderTexts && d.senderTexts[s.name] ? d.senderTexts[s.name].split(/\s+/).filter(Boolean).length : 0);
          const td5 = document.createElement('td'); td5.textContent = (s.wordstock!=null) ? s.wordstock : (d.senderTexts && d.senderTexts[s.name] ? (new Set(String(d.senderTexts[s.name]).toLowerCase().replace(/[^\n\p{L}\p{N}'\s]+/gu,' ').split(/\s+/).filter(Boolean))).size : 0);
          const td6 = document.createElement('td'); td6.textContent = (s.longest!=null) ? s.longest : '0';
          const td7 = document.createElement('td'); td7.textContent = (s.avgWords!=null) ? (Math.round(s.avgWords*10)/10) : '0';
          tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3); tr.appendChild(td4); tr.appendChild(td5); tr.appendChild(td6); tr.appendChild(td7);
          tbody.appendChild(tr);
        });
        // wire wordcloud generation and toggle
        const genBtn = document.getElementById('genCloud');
        const maxWordsInput = document.getElementById('maxWords');
        const participantsEl = document.getElementById('participants');
        const canvasEl = document.getElementById('wordCanvas');
        const topWordsEl = document.getElementById('topWords');
        // build participant selector so user can pick one or more senders
        function initParticipants(){
          if (!participantsEl) return;
          participantsEl.innerHTML = '<h3>Participants</h3>';
          const ctrl = document.createElement('div');
          ctrl.style.marginTop = '6px';
          participantsEl.appendChild(ctrl);
          const list = document.createElement('div'); list.style.marginTop = '8px';
          (d.senders || []).forEach(s => {
            const label = document.createElement('label'); label.style.display='inline-block'; label.style.marginRight='12px'; label.style.marginBottom='6px';
            const cb = document.createElement('input'); cb.type='checkbox'; cb.className='participant-cb'; cb.value = s.name; cb.checked = true; cb.style.marginRight='6px';
            cb.addEventListener('change', onParticipantChange);
            const nameEl = document.createElement('span'); nameEl.textContent = s.name;
            label.appendChild(cb); label.appendChild(nameEl); list.appendChild(label);
          });
          participantsEl.appendChild(list);
        }

        function getSelectedText(){
          const checked = Array.from(document.querySelectorAll('.participant-cb:checked')).map(x=>x.value);
          if (!checked.length) return d.text || '';
          const parts = [];
          for (const name of checked){ if (d.senderTexts && d.senderTexts[name]) parts.push(d.senderTexts[name]); }
          return parts.join(' ');
        }

        function onParticipantChange(){
          if (showingCloud){ generateCloud(); } else { showTopWords(); }
          if (window._dayGraphRedraw) window._dayGraphRedraw();
          if (typeof renderEmojiStats === 'function') renderEmojiStats();
        }
        function generateCloud(){
          const text = getSelectedText();
          const maxWords = parseInt(maxWordsInput.value,10) || 80;
          renderWordCloud(text, {maxWords});
        }

        function showTopWords(){
          const text = getSelectedText();
          listTopWords(text, {maxItems:25});
        }

        // toggle behavior: default shows cloud
        let showingCloud = true;
        genBtn.textContent = 'Show Top 25 Words';
        genBtn.addEventListener('click', ()=>{
          if (showingCloud){
            // switch to list
            showingCloud = false;
            canvasEl.style.display = 'none';
            topWordsEl.style.display = 'block';
            showTopWords();
            genBtn.textContent = 'Show Word Cloud';
          } else {
            // switch to cloud
            showingCloud = true;
            topWordsEl.style.display = 'none';
            canvasEl.style.display = 'block';
            generateCloud();
            genBtn.textContent = 'Show Top 25 Words';
          }
        });

        // init participants UI, auto-generate cloud on load and render daily graph
        initParticipants();
        setTimeout(()=>{
            if(d.perDay && d.perDay.length) renderDailyGraph(d.perDay, d.perSenderDay);
          if(d.text) generateCloud();
          if (typeof renderEmojiStats === 'function') renderEmojiStats();
        }, 40);
      } catch (e){
        console.error('Failed to parse results', e);
      }
    }

    document.getElementById('back').addEventListener('click', ()=>{
      window.location.href = 'index.html';
    });

    // native word-cloud renderer (canvas)
    function renderWordCloud(text, opts){
      const canvas = document.getElementById('wordCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width = Math.min(900, Math.max(600, canvas.clientWidth));
      const H = canvas.height = 600;
      ctx.clearRect(0,0,W,H);

      if (!text || String(text).trim().length===0) return;

      // tokenize
      const stopwords = new Set(['the','and','to','a','i','you','is','in','of','for','it','that','on','my','me','are','we','this','with','have','be','not','but','as','they','at','or','was','so','if','from','just','do','what','what','how','your']);
      const cleaned = text.toLowerCase().replace(/[\u2018\u2019\u201c\u201d]/g,'').replace(/[^\p{L}\p{N}'\s]+/gu,' ');
      const parts = cleaned.split(/\s+/).filter(Boolean);
      const counts = Object.create(null);
      for (const w of parts){
        if (w.length<2) continue;
        if (stopwords.has(w)) continue;
        counts[w] = (counts[w]||0)+1;
      }
      const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0, opts.maxWords || 80);
      if (entries.length===0) return;

      const freqs = entries.map(e=>e[1]);
      const fmin = Math.min(...freqs);
      const fmax = Math.max(...freqs);
      const minFont = 14, maxFont = 72;

      const placed = [];

      function intersects(r1, r2){
        return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
      }

      const cx = W/2, cy = H/2;

      for (const [word, cnt] of entries){
        const norm = fmax===fmin?0.5:(cnt - fmin)/(fmax - fmin);
        const fontSize = Math.round(minFont + norm*(maxFont-minFont));
        ctx.font = fontSize + 'px Arial';
        const metrics = ctx.measureText(word);
        const w = Math.ceil(metrics.width);
        const h = Math.ceil(fontSize * 1.1);

        // spiral placement
        let placedRect = null;
        const maxAttempts = 800;
        for (let t=0;t<maxAttempts;t++){
          const angle = 0.35 * t;
          const radius = 4 + 2 * t;
          const x = Math.round(cx + radius * Math.cos(angle) - w/2);
          const y = Math.round(cy + radius * Math.sin(angle) - h/2);
          const rect = {x,y,w,h};
          // bounds
          if (rect.x < 0 || rect.y < 0 || rect.x + rect.w > W || rect.y + rect.h > H) continue;
          let ok = true;
          for (const p of placed){ if (intersects(rect, p)) { ok=false; break; } }
          if (ok){ placedRect = rect; break; }
        }
        if (!placedRect) continue;

        // draw
        ctx.fillStyle = `hsl(${(cnt*53)%360} 70% 35%)`;
        ctx.font = fontSize + 'px Arial';
        ctx.fillText(word, placedRect.x, placedRect.y + Math.round(h*0.8));
        placed.push(placedRect);
      }
    }

    // render emoji statistics for selected participants
    function renderEmojiStats(){
      const container = document.getElementById('emoji-stats');
      container.innerHTML = '';
      // helper: extract emojis using unicode Extended_Pictographic property
      const emojiRx = /\p{Extended_Pictographic}/gu;

      // get selected participant names
      const selected = Array.from(document.querySelectorAll('.participant-cb:checked')).map(x=>x.value);
      const selectedAll = selected.length === 0; // empty => all

      // combined text
      const combined = getSelectedText();

      function countEmojisFromText(text){
        const counts = Object.create(null);
        if (!text) return counts;
        let m;
        while ((m = emojiRx.exec(text)) !== null){
          const e = m[0];
          counts[e] = (counts[e]||0) + 1;
        }
        return counts;
      }

      // combined top 5
      const combinedCounts = countEmojisFromText(combined);
      const combinedEntries = Object.entries(combinedCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

      const heading = document.createElement('h3'); heading.textContent = 'Top Emojis'; container.appendChild(heading);
      if (combinedEntries.length===0){
        const p = document.createElement('div'); p.textContent = 'No emojis found for selected participants.'; container.appendChild(p);
      } else {
        const row = document.createElement('div'); row.style.marginBottom='8px';
        combinedEntries.forEach(([e,c])=>{
          const span = document.createElement('span'); span.style.display='inline-block'; span.style.marginRight='12px'; span.style.fontSize='20px'; span.textContent = `${e} ${c}`;
          row.appendChild(span);
        });
        container.appendChild(row);
      }
    }

    // render daily messages bar chart; expects array [{date:'YYYY-MM-DD',count: N}, ...]
    function renderDailyGraph(list, perSenderDay){
      const canvas = document.getElementById('dayCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width = Math.min(900, Math.max(600, canvas.clientWidth));
      const H = canvas.height = 300;
      ctx.clearRect(0,0,W,H);
      if (!list || !list.length) return;
      const dates = list.map(x=>x.date);
      const totalCounts = list.map(x=>x.count);
      const max = Math.max(...totalCounts, 1);
      const padding = 40;
      const chartW = W - padding*2;
      const chartH = H - padding*2;

      // background
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);

      // draw grid lines
      ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
      for (let g=0; g<=4; g++){
        const y = padding + (g/4)*chartH;
        ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding+chartW, y); ctx.stroke();
      }

      // legend area: show total toggle and per-sender swatches. Visibility is driven
      // by the participant checkboxes (so the same controls affect wordcloud and graph).
      const colors = [];
      const legend = document.getElementById('dayLegend');
      legend.innerHTML = '';
      // add total toggle
      const totalToggle = document.createElement('label');
      totalToggle.style.display = 'inline-block'; totalToggle.style.marginRight='12px'; totalToggle.style.marginBottom='6px';
      const totalCb = document.createElement('input'); totalCb.type = 'checkbox'; totalCb.checked = true; totalCb.style.marginRight='6px';
      const totalLabel = document.createElement('span'); totalLabel.textContent = 'Show total';
      totalToggle.appendChild(totalCb); totalToggle.appendChild(totalLabel);
      legend.appendChild(totalToggle);
      // store basic state; visibility is read from participant checkboxes
      window._dayGraphState = { dates, perSenderDay };
      if (perSenderDay && perSenderDay.length){
        perSenderDay.forEach((s, idx)=>{
          const hue = (idx*57) % 360;
          const color = `hsl(${hue} 70% 45%)`;
          colors.push(color);

          // legend swatch + name (no checkbox here; use participant controls)
          const label = document.createElement('span');
          label.style.display = 'inline-block'; label.style.marginRight='12px'; label.style.marginBottom='6px'; label.style.verticalAlign='middle';
          const sw = document.createElement('svg'); sw.setAttribute('width','12'); sw.setAttribute('height','12'); sw.style.verticalAlign='middle'; sw.style.marginRight='6px';
          sw.innerHTML = `<rect width="12" height="12" fill="${color}"></rect>`;
          const nameEl = document.createElement('strong'); nameEl.textContent = s.name; nameEl.style.marginLeft='4px';
          label.appendChild(sw); label.appendChild(nameEl);
          legend.appendChild(label);
        });
      }

      // helper: draw a smooth curve through points using quadratic bezier approximation
      function drawSmooth(ctx, pts){
        if (!pts || pts.length===0) return;
        if (pts.length===1){ ctx.fillRect(pts[0].x, pts[0].y, 2, 2); return; }
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i=1;i<pts.length-1;i++){
          const xc = (pts[i].x + pts[i+1].x)/2;
          const yc = (pts[i].y + pts[i+1].y)/2;
          ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
        }
        // curve to last point
        const last = pts[pts.length-1];
        const prev = pts[pts.length-2];
        ctx.quadraticCurveTo(prev.x, prev.y, last.x, last.y);
      }

      // redraw function that respects visibility and rescales axes
      function redrawLines(){
        // compute visible max from visible senders (determined by participant checkboxes)
        const visibleSenderSeries = [];
        if (perSenderDay && perSenderDay.length){
          perSenderDay.forEach((s, idx)=>{
            const cb = document.querySelector(`.participant-cb[value="${s.name}"]`);
            if (!cb || cb.checked){
              visibleSenderSeries.push(s.daily.map(x=>x.count));
            }
          });
        }

        // compute visibleTotals (sum across visible senders per date)
        const visibleTotals = [];
        for (let i=0;i<dates.length;i++){
          let sum = 0;
          for (const series of visibleSenderSeries) sum += (series[i]||0);
          visibleTotals.push(sum);
        }

        // determine y-axis max: if total line is shown, include visibleTotals; otherwise base on per-sender maxima
        let maxFromSenders = 1;
        if (visibleSenderSeries.length){
          for (const s of visibleSenderSeries){ for (const v of s) if (v>maxFromSenders) maxFromSenders = v; }
        }
        const maxFromTotals = (window._dayGraphState.showTotal !== false) ? Math.max(...visibleTotals, 1) : 0;
        const maxVal = Math.max(maxFromSenders, maxFromTotals, 1);

        // clear only the chart area
        ctx.clearRect(0,0,W,H);
        // background and grid
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
        for (let g=0; g<=4; g++){
          const y = padding + (g/4)*chartH;
          ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding+chartW, y); ctx.stroke();
        }

        // draw per-sender lines if visible (smooth)
        if (perSenderDay && perSenderDay.length){
          perSenderDay.forEach((s, idx)=>{
            const cb = document.querySelector(`.participant-cb[value="${s.name}"]`);
            if (cb && !cb.checked) return;
            const hue = (idx*57) % 360; const color = `hsl(${hue} 70% 45%)`;
            const points = s.daily.map((x,i)=>({ x: padding + (i/(s.daily.length-1||1))*chartW, y: padding + chartH - (x.count/maxVal)*chartH }));
            drawSmooth(ctx, points);
            ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
          });
        }

        // draw total line if enabled (use visibleTotals so total reflects hidden/visible senders)
        if (window._dayGraphState.showTotal !== false){
          const totalPoints = visibleTotals.map((v,i)=>({ x: padding + (i/(visibleTotals.length-1||1))*chartW, y: padding + chartH - (v/maxVal)*chartH }));
          drawSmooth(ctx, totalPoints);
          ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.stroke();
        }

        // x labels
        ctx.fillStyle = '#222'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
        const step = Math.ceil(dates.length / 8);
        for (let i=0;i<dates.length;i+=step){
          const x = padding + (i/(dates.length-1||1))*chartW;
          ctx.fillText(dates[i], x, padding + chartH + 16);
        }

        // y axis ticks (based on maxVal)
        ctx.textAlign = 'right'; ctx.font = '11px Arial';
        for (let t=0;t<=4;t++){
          const v = Math.round((maxVal/4)*t);
          const y = padding + chartH - Math.round((v/maxVal)*chartH);
          ctx.fillText(String(v), padding-8, y+4);
        }
      }

      // attach total toggle handler and initial state
      window._dayGraphState.showTotal = true;
      totalCb.addEventListener('change', ()=>{ window._dayGraphState.showTotal = totalCb.checked; redrawLines(); });

      // expose redraw so participant change handler can update the graph
      window._dayGraphRedraw = redrawLines;

      // initial draw
      redrawLines();
    }

    // list top words with counts and relative frequencies
    function listTopWords(text, opts){
      const container = document.getElementById('topWords');
      container.innerHTML = '';
      if (!text || String(text).trim().length===0){ container.textContent = 'No text available for word list.'; return; }

      const stopwords = new Set(['the','and','to','a','i','you','is','in','of','for','it','that','on','my','me','are','we','this','with','have','be','not','but','as','they','at','or','was','so','if','from','just','do','what','how','your']);
      const cleaned = text.toLowerCase().replace(/[\u2018\u2019\u201c\u201d]/g,'').replace(/[^\p{L}\p{N}'\s]+/gu,' ');
      const parts = cleaned.split(/\s+/).filter(Boolean);
      const counts = Object.create(null);
      let total = 0;
      for (const w of parts){
        if (w.length<2) continue;
        if (stopwords.has(w)) continue;
        counts[w] = (counts[w]||0)+1; total += 1;
      }
      const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0, opts.maxItems || 25);

      const table = document.createElement('table');
      table.style.width = '100%';
      table.style.borderCollapse = 'collapse';
      const thead = document.createElement('thead');
      thead.innerHTML = '<tr><th style="text-align:left;padding:6px">Word</th><th style="padding:6px">Count</th><th style="padding:6px">Frequency</th></tr>';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      for (const [w,c] of entries){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td style="padding:6px">${w}</td><td style="text-align:center;padding:6px">${c}</td><td style="text-align:center;padding:6px">${((c/total)*100).toFixed(1)}%</td>`;
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      container.appendChild(table);
      // scroll into view
      container.scrollIntoView({behavior:'smooth'});
    }
  </script>
</body>
</html>
